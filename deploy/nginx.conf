# ch42 Nginx 配置（前端 SPA + 反向代理去掉 — 当前无后端服务）
# 前端静态资源 root /var/www/frontend。
# 历史上保留的 /api/、/sso/、/api/vitals 反代到 backend:8080 的几个 location
# 块都给删了 —— 项目无 backend，nginx 启动时 resolv 不到 backend 直接 emerg。
# 当前 SPA 用 MSW 拦截 /api/* 的真后端调用，nginx 这层只负责 serve SPA。

server {
    listen 80;
    server_name _;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # 前端 SPA 静态资源
    location / {
        root /var/www/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存（带 hash 的 js/css 永久缓存）
    location /assets/ {
        root /var/www/frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html 不缓存（保证发布后立即生效）
    location = /index.html {
        root /var/www/frontend;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
