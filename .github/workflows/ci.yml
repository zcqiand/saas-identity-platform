name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      VITE_OFFLINE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: https://registry.npmmirror.com/
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Run coverage
        run: npm run test:coverage
      - name: Build
        run: npm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          if-no-files-found: error
          retention-days: 7

  # ch42：追加 docker 构建验证 job
  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: saas-identity-platform:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # git push 到 master → 自动部署到 VPS（CI 全绿后才推）
  deploy:
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    concurrency: deploy-master
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
    steps:
      - name: Trust VPS host key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Write deploy SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Ensure dist.new/ exists on VPS
        # 第一次部署时 dist.new 不存在；scp 命令不会自动创建远端目录
        # 用 runner 的 ~/.ssh/known_hosts + ~/.ssh/deploy_key（前面 step 写好的），
        # 不用第三方 action —— 它们启 docker sidecar 自带 ~/.ssh，看不到 runner 状态。
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -o BatchMode=yes \
              "$VPS_USER@$VPS_HOST" \
              "mkdir -p /var/www/saas-identity-platform/dist.new"

      - name: Copy dist to VPS (atomic)
        # 用 ubuntu-latest runner 自带的 openssh-client，不再依赖第三方 action
        # scp 在 openssh-client 包里，runner 已经预装
        run: |
          scp -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -rp dist/. \
              "$VPS_USER@$VPS_HOST:/var/www/saas-identity-platform/dist.new/"

      - name: Atomic swap on VPS
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -o BatchMode=yes \
              "$VPS_USER@$VPS_HOST" <<'EOF'
            set -e
            cd /var/www/saas-identity-platform
            rm -rf dist.old
            [ -d dist ] && mv dist dist.old || true
            mv dist.new dist
            sudo nginx -s reload
            date -u
          EOF
