name: ci

# 项目铁律 [CLAUDE.md] 第 2 段：「tag 即放行：全量回归绿后打 v<MAJOR>.<MINOR>-<NNN>」。
# - branch push（master/main）→ 只跑 test（验证回归）
# - tag push（v1.2-001 这种）  → test + 部署
on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      VITE_OFFLINE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: https://registry.npmmirror.com/
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Run coverage
        run: npm run test:coverage

  # tag 即放行：push v<MAJOR>.<MINOR>-<NNN> → CI 全绿 →
  #   docker build & push (latest + 版本 tag) → VPS pull & restart
  # 仿 changli-ui 已知能跑版：docker/build-push-action@v6 → appleboy/ssh-action@master
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    environment: VPS
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/saas-identity-platform:latest
            ${{ secrets.DOCKER_USERNAME }}/saas-identity-platform:${{ github.ref_name }}

      - name: Pull image and restart container on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          # 密钥路径走法
          key: ${{ secrets.VPS_SSH_KEY }}
          # 显式信任的 host key fingerprint：避免 appleboy ssh-action 的
          # sidecar 容器看不到 runner 端 ~/.ssh/known_hosts 时被 StrictHostKeyChecking 拒
          # 本地跑一次 ssh-keyscan -t ed25519 <host> 拿到 SHA256:...
          fingerprint: ${{ secrets.VPS_FINGERPRINT }}
          script: cd /home/deploy/saas-identity-platform && sh saas-identity-platform.sh "${{ secrets.DOCKER_USERNAME }}" "${{ secrets.DOCKER_PASSWORD }}" "${{ github.ref_name }}"
